<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로또 번호 생성기</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="light-mode">
    <div class="container">
        <header>
            <h1>로또 번호 생성기</h1>
            <button id="theme-toggle" class="btn-theme">다크 모드</button>
        </header>
        
        <main>
            <div class="controls">
                <button id="generate-btn" class="btn-primary">번호 생성하기</button>
            </div>
            
            <div id="lotto-container" class="lotto-results">
                <!-- 번호 세트가 여기에 생성됩니다 -->
            </div>
        </main>
    </div>
    <script src="main.js"></script>
</body>
</html>
